.back {

    border-radius:12px;
}

h2 {

label {

input, textarea, select {

.btn {

    font-weight:bold;

    color:#94a3b8;

.popup {

    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;

.popup-box {
    position:relative;
    background:#020617;
    padding:25px;
    border-radius:12px;
    max-width:400px;
    text-align:center;

.close {

    color:#94a3b8;
